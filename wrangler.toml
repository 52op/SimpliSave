# SimpliSave - Cloudflare Workers/Pages 配置
# 文档：https://developers.cloudflare.com/workers/wrangler/configuration/

name = "simplisave"
main = "workers/index.ts"
compatibility_date = "2024-04-05"
compatibility_flags = ["nodejs_compat"]

# 开发环境配置
[vars]
ENVIRONMENT = "development"
# ⚠️ 生产环境必须修改此密钥！使用 openssl rand -hex 32 生成
JWT_SECRET = "your-secret-key-change-in-production"

# D1 数据库绑定
# 创建数据库：wrangler d1 create simplisave-db
# 执行迁移：wrangler d1 execute simplisave-db --file=schema.sql
[[d1_databases]]
binding = "DB"
database_name = "simplisave-db"
# 替换为实际的 database_id
database_id = "your-d1-database-id"

# KV 命名空间绑定（可选，用于缓存/会话）
# 创建：wrangler kv:namespace create "KV"
[[kv_namespaces]]
binding = "KV"
id = "your-kv-namespace-id"
# 预览环境可使用不同的 KV
preview_id = "your-preview-kv-namespace-id"

# 站点配置（Pages 部署）
[site]
bucket = "./dist"

# 本地开发服务器配置
[dev]
port = 8788
local_protocol = "http"

# 生产环境覆盖配置
# 使用 wrangler deploy --env production 部署
[env.production]
name = "simplisave-production"
vars = { ENVIRONMENT = "production" }
# 生产环境使用不同的 D1 数据库（可选）
# [[env.production.d1_databases]]
# binding = "DB"
# database_name = "simplisave-db-prod"
# database_id = "your-production-database-id"
