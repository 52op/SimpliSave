# SimpliSave - Cloudflare Pages 配置
# 文档：https://developers.cloudflare.com/pages/configuration/

# 注意：这是 Cloudflare Pages 项目，不是 Workers
# Pages 会自动识别 functions/ 目录作为 API
# 静态资源从 dist/ 目录部署

# 本地开发配置（可选）
[dev]
port = 8788
local_protocol = "http"

# 生产环境变量
# 在 Cloudflare Dashboard 中配置：
# Settings -> Environment variables
# - ENVIRONMENT: production
# - JWT_SECRET: <随机生成的密钥>
