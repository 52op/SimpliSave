# wrangler-workers.toml - Workers API 配置
# 用于单独部署 API 后端

name = "simplisave-api"
main = "workers/index.ts"
compatibility_date = "2024-04-05"
compatibility_flags = ["nodejs_compat"]

# 环境变量
[vars]
ENVIRONMENT = "production"
# ⚠️ 在 Cloudflare Dashboard 或 GitHub Secrets 中配置 JWT_SECRET

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "simplisave-db"
database_id = "your-d1-database-id"

# KV 命名空间绑定（可选）
[[kv_namespaces]]
binding = "KV"
id = "your-kv-namespace-id"
