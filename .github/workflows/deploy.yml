name: Deploy to Cloudflare

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  deployments: write

jobs:
  deploy-workers:
    runs-on: ubuntu-latest
    outputs:
      workers-url: ${{ steps.get-url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Update wrangler-workers.toml with secrets
        run: |
          # 替换 database_id
          sed -i 's|database_id = ".*"|database_id = "${{ secrets.D1_DATABASE_ID }}"|' wrangler-workers.toml
          # 在 [vars] 下添加 JWT_SECRET（否则会被放入 d1_databases 块）
          sed -i '/^\[vars\]/a JWT_SECRET = "${{ secrets.JWT_SECRET }}"' wrangler-workers.toml

      - name: Deploy Workers API
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --config wrangler-workers.toml

      - name: Get Workers URL
        id: get-url
        run: |
          # Workers URL 格式: https://<name>.<account-subdomain>.workers.dev
          # 简化方案：直接使用固定格式
          WORKER_NAME="simplisave-api"
          
          # 使用 Cloudflare API 获取账户信息
          ACCOUNT_INFO=$(curl -s "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json")
          
          # 提取账户子域名（通常与账户 ID 相同或类似）
          # 简化：使用固定的 workers.dev 格式
          # 实际 URL 会在部署后显示在 Cloudflare Dashboard 中
          WORKERS_URL="https://${WORKER_NAME}.${{ secrets.CF_ACCOUNT_ID }}.workers.dev"
          
          echo "url=${WORKERS_URL}" >> $GITHUB_OUTPUT
          echo "✅ Workers URL: ${WORKERS_URL}"
          echo ""
          echo "⚠️  如果此 URL 无法访问，请检查 Cloudflare Dashboard 中的实际 URL"
          echo "   并更新 GitHub Secret: WORKERS_URL"

  deploy-pages:
    runs-on: ubuntu-latest
    needs: deploy-workers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Build with Workers URL
        run: |
          # 使用 Workers 输出的 URL，如果为空则使用 GitHub Secret
          WORKERS_URL="${{ needs.deploy-workers.outputs.workers-url }}"
          if [ -z "$WORKERS_URL" ] || [ "$WORKERS_URL" = "https://simplisave-api..workers.dev" ]; then
            WORKERS_URL="${{ secrets.WORKERS_URL }}"
          fi
          
          if [ -z "$WORKERS_URL" ]; then
            echo "❌ Error: WORKERS_URL is empty!"
            echo "请在 GitHub Secrets 中添加 WORKERS_URL"
            exit 1
          fi
          
          echo "📡 Using Workers URL: $WORKERS_URL"
          # 写入 .env.production
          echo "VITE_API_URL=$WORKERS_URL" > .env.production
          cat .env.production
          npm run build

      - name: Create Pages Project (if not exists)
        run: |
          echo "Creating Pages project if it doesn't exist..."
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"simplisave","production_branch":"main"}' || true
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: simplisave
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
