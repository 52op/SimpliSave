name: Deploy to Cloudflare

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  deployments: write

jobs:
  deploy-workers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Update wrangler-workers.toml with secrets
        run: |
          # 替换 database_id
          sed -i 's|database_id = ".*"|database_id = "${{ secrets.D1_DATABASE_ID }}"|' wrangler-workers.toml
          # 添加 JWT_SECRET
          echo 'JWT_SECRET = "${{ secrets.JWT_SECRET }}"' >> wrangler-workers.toml
          # 显示配置（不显示敏感信息）
          cat wrangler-workers.toml | grep -v "JWT_SECRET\|database_id"

      - name: Deploy Workers API
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --config wrangler-workers.toml

  deploy-pages:
    runs-on: ubuntu-latest
    needs: deploy-workers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Build with Workers URL
        run: |
          # 从 secrets 获取 Workers URL，如果不存在则使用默认值
          WORKERS_URL="${{ secrets.WORKERS_URL }}"
          if [ -z "$WORKERS_URL" ]; then
            WORKERS_URL="https://simplisave-api.${{ secrets.CF_ACCOUNT_ID }}.workers.dev"
          fi
          echo "VITE_API_URL=$WORKERS_URL" > .env.production
          npm run build

      - name: Create Pages Project (if not exists)
        run: |
          echo "Creating Pages project if it doesn't exist..."
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"simplisave","production_branch":"main"}' || true
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: simplisave
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
